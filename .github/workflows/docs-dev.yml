name: docs-dev

on:
  pull_request:
    branches-ignore:
      - main

jobs:
  docs-dev:
    runs-on: ubuntu-latest
    permissions:
      pages: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: yarn install

      # run build script
      - name: Build VitePress site
        run: yarn build
        env:
          VITEPRESS_BASE: /pinguinoide.github.io/
